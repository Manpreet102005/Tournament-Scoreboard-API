<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login / Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>
        Tournament Scoreboard System
    </h1>
</header>
<main>
    <div id="login-form">
        <div id="mode">
            <button id="login-button" class="active mode-button">Login</button>
            <button id="register-button" class="mode-button">Register</button>
        </div>
        <div id="details">
            <div class="details-row">
                <label for="username">Username:</label>
                <input type="text" id="username">
            </div>
            <div class="details-row">
                <label for="password">Password:</label>
                <input type="password" id="password">
            </div>
        </div>
        <div id="message"></div>
        <div id="submit-div">
            <button id="submit-button" class="buttons" type="submit">Submit</button>
        </div>
    </div>
</main>
<script src="js/util.js"></script>
<script src="js/login.js"></script>
</body>
</html>
