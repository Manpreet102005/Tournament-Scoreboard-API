<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Match Console</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/9633a751b5.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div id="nav-bar">
            <a href="matches.html" style="display: block;text-decoration: none; color: inherit;">
                <div class="back-nav" >
                <div class="back-nav-symbol">
                    <i class="fa-solid fa-angle-left fa-xl" style="color: rgb(255, 255, 255);"></i> 
                </div>
            <div class="back-nav-text">Back</div>
            </div>
            </a>
        </div>
    </header>
    <main>
       <div id="console-matches-container">
        <h3 class="match-status-heading">Ongoing Matches</h3>
        <br>
        <div id="ongoing-container" class="container">
            
        </div>
        <div id="update-team-scores" class="modal pop-modal">
            <div class="modal-content">
                <h3>Update Score</h3>
                <div class="label">Team A Score</div>
                <input type="number" id="team-A-score">
                <div class="label">Team B Score</div>
                <input type="number" id="team-B-score">
                <button class="buttons" id="update-score-ok">Update</button>
                <button class="buttons" id="upadte-score-cancel">Cancel</button>
            </div>
        </div>
        <div id="end-match" class="modal pop-modal">
            <div class="modal-content">
                <h3>End Match</h3>
                <button class="buttons" id="end-match-ok">End</button>
                <button class="buttons" id="end-match-cancel">Cancel</button>
            </div>
        </div>
        <br>
        <h3 class="match-status-heading">Scheduled Matches</h3>
        <br>
        <div id="scheduled-container" class="container">
            
        </div>

        <div id="start-match" class="modal pop-modal">
            <div class="modal-content">
                <h3>Start Match</h3>
                <button class="buttons" id="start-match-ok">Start</button>
                <button class="buttons" id="start-match-cancel">Cancel</button>
            </div>
        </div>
         <div id="reschedule-match" class="modal pop-modal">
            <div class="modal-content">
                <h3>Reschedule Match</h3>
                <div class="label">New Date Time</div>
                <input type="datetime-local" id="new-date-time">
                <button class="buttons" id="reschedule-match-ok">Reschedule</button>
                <button class="buttons" id="reschedule-match-cancel">Cancel</button>
            </div>
        </div>
        <div id="delete-match" class="modal pop-modal">
            <div class="modal-content">
                <h3>Delete Match</h3>
                <div class="label">New Date Time</div>
                <input type="datetime-local" id="new-date-time">
                <button class="buttons" id="delete-match-ok">Reschedule</button>
                <button class="buttons" id="delete-match-cancel">Cancel</button>
            </div>
        </div>

        <br>
        <h3 class="match-status-heading">Completed Matches</h3>
        <br>
        <div id="completed-container" class="container">
           
        </div>
       </div>
    </main>
    <script src="js/util.js"></script>
    <script src="js/matchAdminConsole.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
