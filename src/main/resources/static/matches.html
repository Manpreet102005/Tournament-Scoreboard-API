<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/9633a751b5.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div id="nav-bar">
            <div class="nav-bar-left">
                <div id="scoreboard" class="nav-bar-tab">
                    <a href="scoreboard.html">Scoreboard</a>
                </div>
                <div id="matches" class="nav-bar-tab active ">
                    <a href="matches.html">Matches</a>
                </div>
                <div id="teams" class="nav-bar-tab">
                    <a href="teams.html">Teams</a>
                </div>
                <div id="players" class="nav-bar-tab">
                    <a href="players.html">Players</a>
                </div>
            </div>
            <div class="nav-bar-right">
                <i class="fa-solid fa-bars fa-xl" id="burger-menu-icon" style="color: white; cursor: pointer;"></i>
                <div id="user-dropdown" class="user-menu">
                    <div id="menu-promote" class="user-menu-item admin-only" style="display: none;">Promote User</div>
                    <div id="menu-logout" class="user-menu-item">Logout</div>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="admin-div admin-only">
            <button id="add-match" class="buttons admin-buttons">Add Match</button>
            <button id="match-console" class="buttons admin-buttons ">Match Console</button>
        </div>
        <br>
        <div id="add-match-modal" class="modal pop-modal">
            <div class="modal-content modal-content-pop">
                <h3>Add Match</h3>
                <input id="match-title" class="modal-input" type="text" placeholder=" Match Title">
                <input id="match-date-time" class="modal-input" type="datetime-local" placeholder="">
                <input id="team-A-id" class="modal-input" type="number" placeholder=" Team A Id">
                <input id="team-B-id" class="modal-input" type="number" placeholder=" Team B Id">
                <button class="buttons" id="add-match-ok">Add</button>
                <button class="buttons " id="add-match-cancel">Cancel</button>
            </div>
        </div>
        <div class="table-container paginated-container">
            <table>
                <thead>
                    <tr>
                        <th>Match Id</th>
                        <th>Match Title</th>
                        <th>Match Date Time</th>
                        <th>Team A Name </th>
                        <th>Team B Name</th>
                        <th>Team A Score</th>
                        <th>Team B Score</th>
                        <th>Match Status</th>
                    </tr>
                </thead>
                <tbody id="matches-table-body"></tbody>
            </table>
        </div>
        <div class="pagination-nav-div">
                <button id="prev" class="buttons pagination-buttons">Prev</button>
                <button id="next" class="buttons pagination-buttons">Next</button>
        </div>
    </main>
    <script src="js/util.js"></script>
    <script src="js/matches.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
