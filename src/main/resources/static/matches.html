<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div id="nav-bar">
            <div id="scoreboard" class="nav-bar-tabs ">
                <a href="scoreboard.html">Scoreboard</a>
            </div>
            <div id="matches" class="nav-bar-tabs active ">
                <a href="matches.html">Matches</a>
            </div>
            <div id="teams" class="nav-bar-tabs ">
                <a href="teams.html">Teams</a>
            </div>
            <div id="players" class="nav-bar-tabs ">
                <a href="players.html">Players</a>
            </div>
        </div>
    </header>
    <main>
        <div class="admin-div admin-only">
            <button id="add-match" class="buttons admin-buttons">Add Match</button>
            <button id="match-console" class="buttons admin-buttons ">Match Console</button>
        </div>
        <br>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Match Id</th>
                        <th>Match Title</th>
                        <th>Match Date Time</th>
                        <th>Team A Name </th>
                        <th>Team B Name</th>
                        <th>Team A Score</th>
                        <th>Team B Score</th>
                        <th>Match Status</th>
                    </tr>
                </thead>
                <tbody id="matches-table-body"></tbody>
            </table>
        </div>
        <div class="pagination-nav-div">
                <button id="prev" class="buttons pagination-buttons">Prev</button>
                <button id="next" class="buttons pagination-buttons">Next</button>
        </div>
    </main>
    <script src="js/auth.js"></script>
</body>
</html>
