<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/9633a751b5.js" crossorigin="anonymous"></script>
</head>
<body>
   <header>
        <div id="nav-bar">
            <div class="nav-bar-left">
                <div id="scoreboard" class="nav-bar-tab">
                    <a href="scoreboard.html">Scoreboard</a>
                </div>
                <div id="matches" class="nav-bar-tab">
                    <a href="matches.html">Matches</a>
                </div>
                <div id="teams" class="nav-bar-tab">
                    <a href="teams.html">Teams</a>
                </div>
                <div id="players" class="nav-bar-tab active">
                    <a href="players.html">Players</a>
                </div>
            </div>
            <div class="nav-bar-right">
                <i class="fa-solid fa-bars fa-xl" id="burger-menu-icon" style="color: white; cursor: pointer;"></i>
                <div id="user-dropdown" class="user-menu">
                    <div id="menu-promote" class="user-menu-item admin-only" style="display: none;">Promote User</div>
                    <div id="menu-logout" class="user-menu-item">Logout</div>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="admin-div admin-only">
            <button id="add-player" class="buttons admin-buttons">Add Player</button>
            <button id="delete-player" class="buttons admin-buttons">Delete Player</button>
        </div>
        <br>
        <div id="add-player-modal" class="modal pop-modal">
            <div class="modal-content modal-content-pop">
                <h3>Add Player</h3>
                <input id="player-name" class="modal-input" type="text" placeholder=" Player Name">
                <button class="buttons" id="add-player-ok">Add</button>
                <button class="buttons modal-cancel" id="add-player-cancel">Cancel</button>
            </div>
        </div>
        <div id="delete-player-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Delete Player</h3>
                <input id="player-id" class="modal-input" type="number" placeholder=" Player Id">
                <button class="buttons" id="delete-player-ok">Delete</button>
                <button class="buttons modal-cancel" id="delete-player-cancel">Cancel</button>
            </div>
        </div>
       <div class="table-container paginated-container">
            <table>
                <thead>
                    <tr>
                        <th>Player Id</th>
                        <th>Player Name</th>
                        <th>Team Name</th>
                    </tr>
                </thead>
                <tbody id="players-table-body"></tbody>
            </table>
       </div>
       <div class="pagination-nav-div">
                <button id="prev" class="buttons pagination-buttons">Prev</button>
                <button id="next" class="buttons pagination-buttons">Next</button>
        </div>
    </main> 
    <script src="js/util.js"></script> 
    <script src="js/players.js"></script>
    <script src="js/auth.js"></script> 
</body>
</html>
