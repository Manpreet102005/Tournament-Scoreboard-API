<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
   <header>
        <div id="nav-bar">
            <div id="scoreboard" class="nav-bar-tabs ">
                <a href="scoreboard.html">Scoreboard</a>
            </div>
            <div id="matches" class="nav-bar-tabs">
                <a href="matches.html">Matches</a>
            </div>
            <div id="teams" class="nav-bar-tabs ">
                <a href="teams.html">Teams</a>
            </div>
            <div id="players" class="nav-bar-tabs active">
                <a href="players.html">Players</a>
            </div>
        </div>
    </header>
    <main>
        <div class="admin-div admin-only">
            <button id="add-player" class="buttons admin-buttons">Add Player</button>
            <button id="delete-player" class="buttons admin-buttons">Delete Player</button>
        </div>
        <br>
        <div id="add-player-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Add Player</h3>
                <input type="text" placeholder="Player Name">
                <button class="buttons" id="add-player-pk">Add</button>
                <button class="buttons" id="add-player-cancel">Cancel</button>
            </div>
        </div>
        <div id="delete-player-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Delete Player</h3>
                <input type="number" placeholder="Player Id">
                <button class="buttons" id="delete-player-ok">Delete</button>
                <button class="buttons" id="delete-player-cancel">Cancel</button>
            </div>
        </div>
       <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Player Id</th>
                        <th>Player Name</th>
                        <th>Team Name</th>
                    </tr>
                </thead>
                <tbody id="players-table-body"></tbody>
            </table>
       </div>
       <div class="pagination-nav-div">
                <button id="prev" class="buttons pagination-buttons">Prev</button>
                <button id="next" class="buttons pagination-buttons">Next</button>
        </div>
    </main> 
</body>
</html>
