<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/9633a751b5.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div id="nav-bar">
            <div class="nav-bar-left">
                <div id="scoreboard" class="nav-bar-tab">
                    <a href="scoreboard.html">Scoreboard</a>
                </div>
                <div id="matches" class="nav-bar-tab ">
                    <a href="matches.html">Matches</a>
                </div>
                <div id="teams" class="nav-bar-tab active">
                    <a href="teams.html">Teams</a>
                </div>
                <div id="players" class="nav-bar-tab">
                    <a href="players.html">Players</a>
                </div>
            </div>
            <div class="nav-bar-right">
                <i class="fa-solid fa-bars fa-xl" id="burger-menu-icon" style="color: white; cursor: pointer;"></i>
                <div id="user-dropdown" class="user-menu">
                    <div id="menu-promote" class="user-menu-item admin-only" style="display: none;">Promote User</div>
                    <div id="menu-logout" class="user-menu-item">Logout</div>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="admin-div admin-only">
            <button id="add-team" class="buttons admin-buttons">Add Team</button>
            <button id="remove-team" class="buttons admin-buttons">Remove Team</button>
            <button id="rename-team" class="buttons admin-buttons">Rename Team</button>
            <button id="assign-player-to-team" class="buttons admin-buttons">Assign Player</button>
        </div>
        <br>
        <div id="add-team-modal" class="modal pop-modal">
            <div class="modal-content modal-content-pop">
                <h3>Add Team</h3>
                <input id="team-name" class="modal-input" type="text" placeholder=" Team Name">
                <button class="buttons" id="add-team-ok">Add</button>
                <button class="buttons modal-cancel" id="add-team-cancel">Cancel</button>
            </div>
        </div>
        <div id="remove-team-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Remove Team</h3>
                <input id="remove-team-id" class="modal-input" type="number" placeholder=" Team Id">
                <button class="buttons" id="remove-team-ok">Remove</button>
                <button class="buttons modal-cancel" id="remove-team-cancel">Cancel</button>
            </div>
        </div>
        <div id="rename-team-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Rename Team</h3>
                <input id="rename-team-id" class="modal-input" type="number" placeholder=" Team Id">
                <input id="new-team-name" class="modal-input" type="text" placeholder=" New Team Name">
                <button class="buttons" id="rename-team-ok">Rename</button>
                <button class="buttons modal-cancel" id="rename-team-cancel">Cancel</button>
            </div>
        </div>
        <div id="assign-player-to-team-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Assign Player</h3>
                <input id="assign-team-id" class="modal-input" type="number" placeholder=" Team Id">
                <input id="assign-player-id" class="modal-input" type="number" placeholder=" Player Id">
                <button class="buttons" id="assign-player-ok">Assign</button>
                <button class="buttons modal-cancel" id="assign-player-cancel">Cancel</button>
            </div>
        </div>
       <div class="table-container">
         <table>
            <thead>
                <tr>
                    <th>Team Id</th>
                    <th>Team Name</th>
                    <th>Total Score</th>
                    <th>Matches Played</th>
                    <th>Wins</th>
                    <th>Draws</th>
                </tr>
            </thead>
            <tbody id="teams-table-body"></tbody>
        </table>
       </div>
    </main>
    <script src="js/util.js"></script> 
    <script src="js/teams.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
