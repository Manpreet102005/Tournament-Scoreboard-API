<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div id="nav-bar">
            <div id="scoreboard" class="nav-bar-tabs ">
                <a href="scoreboard.html">Scoreboard</a>
            </div>
            <div id="matches" class="nav-bar-tabs  ">
                <a href="matches.html">Matches</a>
            </div>
            <div id="teams" class="nav-bar-tabs active ">
                <a href="teams.html">Teams</a>
            </div>
            <div id="players" class="nav-bar-tabs ">
                <a href="players.html">Players</a>
            </div>
        </div>
    </header>
    <main>
        <div class="admin-div admin-only">
            <button id="add-team" class="buttons admin-buttons">Add Team</button>
            <button id="remove-team" class="buttons admin-buttons">Remove Team</button>
            <button id="rename-team" class="buttons admin-buttons">Rename Team</button>
            <button id="assign-player-to-team" class="buttons admin-buttons">Assign Player</button>
        </div>
        <br>
        <div id="add-team-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Add Team</h3>
                <input type="text" placeholder="Team Name">
                <button class="buttons" id="add-team-ok">Add</button>
                <button class="buttons" id="add-team-cancel">Cancel</button>
            </div>
        </div>
        <div id="remove-team-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Remove Team</h3>
                <input type="number" placeholder="Team Id">
                <button class="buttons" id="remove-team-ok">Remove</button>
                <button class="buttons" id="remove-team-cancel">Cancel</button>
            </div>
        </div>
        <div id="rename-team-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Rename Team</h3>
                <input type="number" placeholder="Team Id">
                <input type="text" placeholder="New Team Name">
                <button class="buttons" id="rename-team-ok">Rename</button>
                <button class="buttons" id="rename-team-cancel">Cancel</button>
            </div>
        </div>
        <div id="assign-player-to-team-modal" class="modal slide-modal">
            <div class="modal-content">
                <h3>Assign Player</h3>
                <input type="number" placeholder="Team Id">
                <input type="number" placeholder="Player Id">
                <button class="buttons" id="rename-team-ok">Rename</button>
                <button class="buttons" id="rename-team-cancel">Cancel</button>
            </div>
        </div>
       <div class="table-container">
         <table>
            <thead>
                <tr>
                    <th>Team Id</th>
                    <th>Team Name</th>
                    <th>Total Score</th>
                    <th>Matches Played</th>
                    <th>Wins</th>
                    <th>Draws</th>
                </tr>
            </thead>
            <tbody id="teams-table-body"></tbody>
        </table>
       </div>
    </main>
</body>
</html>
